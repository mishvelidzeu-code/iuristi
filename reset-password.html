<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexFlow | პაროლის აღდგენა</title>
  <meta name="description" content="LexFlow-ის პაროლის აღდგენის გვერდი.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&family=Noto+Serif+Georgian:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="page-shell auth-shell">
    <a class="back-link" href="login.html">შესვლის გვერდზე დაბრუნება</a>

    <section class="auth-layout">
      <div class="auth-copy">
        <div class="eyebrow">Password Recovery</div>
        <h1>პაროლის აღდგენა</h1>
        <p>
          შეიყვანე ელფოსტა და გამოგიგზავნით აღდგენის ბმულს, რომ პაროლი უსაფრთხოდ შეცვალო.
        </p>
        <div class="auth-points">
          <span>უსაფრთხო წვდომა</span>
          <span>ელფოსტის დადასტურება</span>
          <span>ახალი პაროლის დაყენება</span>
        </div>
      </div>

      <div class="auth-card">
        <h2>აღდგენის ბმული</h2>
        <form class="auth-form" data-auth-form="reset">
          <label>
            ელფოსტა
            <input name="email" type="email" placeholder="name@example.com" required>
          </label>
          <button type="submit">ბმულის გაგზავნა</button>
        </form>
        <p class="auth-feedback" data-auth-feedback></p>
        <p class="auth-switch">გაიხსენე პაროლი? <a href="login.html">შესვლა</a></p>
      </div>
    </section>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
