iv class="text-xs text-slate-400 uppercase font-bold mb-2">ვადა</div><div id="ddead" class="text-lg font-extrabold"></div></div></div><div class="rounded-3xl bg-slate-50 p-5"><div class="text-xs text-slate-400 uppercase font-bold mb-3">დეტალები</div><div id="dnotes" class="leading-7 whitespace-pre-line"></div></div><div class="rounded-3xl bg-slate-50 p-5"><label class="block w-full px-4 py-4 rounded-2xl border border-dashed border-slate-300 bg-white text-center cursor-pointer"><input id="files" type="file" class="hidden" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg">Word, Excel, PDF და სხვა ფაილების ატვირთვა</label><div id="dmsg" class="off mt-4 rounded-2xl border px-4 py-3 text-sm font-medium"></div><div id="dfiles" class="mt-4 space-y-3"></div></div></div></section><section id="formModal" class="off fixed inset-0 z-50 bg-slate-950/55 backdrop-blur-sm p-4 overflow-y-auto"><div class="min-h-full flex items-start justify-center"><div class="w-full max-w-5xl rounded-[2rem] bg-white border border-slate-200 overflow-hidden"><div class="px-6 py-6 border-b border-slate-100 flex items-start justify-between gap-4"><div><div id="ftitle" class="text-2xl font-extrabold mt-2">ახალი საქმე</div></div><div class="flex gap-3"><button id="resetForm" class="px-4 py-2 rounded-xl border border-slate-200 font-bold text-slate-700">გასუფთავება</button><button id="closeForm" class="px-4 py-2 rounded-xl bg-slate-900 text-white font-bold">დახურვა</button></div></div><form id="form" class="p-6 space-y-8"><input id="fid" type="hidden"><div class="grid lg:grid-cols-2 gap-8"><section class="space-y-4"><input id="fname" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="საქმის დასახელება"><div class="grid md:grid-cols-2 gap-4"><input id="fcode" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="საქმის კოდი"><input id="fclient" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="კლიენტი / კომპანია"></ px-4 py-4 rounded-2xl border bg-white outline-none"><input id="fhearingDate" type="date" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none"></div><div class="grid md:grid-cols-2 gap-4"><input id="fhearingTime" type="time" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none"><input id="freminderDate" type="date" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none"></div><input id="fmeetingLocation" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="სხდომის / შეხვედრის ადგილი"><input id="fnextAction" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="შემდეგი ქმედება"></section><section class="space-y-4"><input id="fopposingParty" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="მოწინააღმდეგე მხარე"><input id="fopposingLawyer" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="მოწინააღმდეგე მხარის იურისტი"><input id="ftags" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none" placeholder="თეგები"><textarea id="fnotes" rows="6" class="w-full px-4 py-4 rounded-2xl border bg-white outline-none resize-none" placeholder="ყველაფერი ამ საქმეზე..."></textarea></section></div><div id="fmsg" class="off rounded-2xl border px-4 py-3 text-sm font-medium"></div><button class="px-6 py-4 rounded-2xl bg-slate-900 text-white font-bold">შენახვა</button></form></div></div></section></div></main>
<script src="supabase-config.js"></script>
<script>
const COURTS=['ყველა','საქალაქო სასამართლო','სააპელაციო სასამართლო','უზენაესი სასამართლო'],CATS=['ყველა','სისხლი','სამოქალაქო','ადმინისტრაციული'],RES=['ყველა','მიმდინარე','მოგებული','წაგებული','მორიგებით დასრულებული','საპროცესო გამოფრებული','შეწყვეტილი'];
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),views={cases:$('#casesView'),detail:$('#detailView')},formModal=$('#formModal');
const fields={id:$('#fid'),name:$('#fname'),code:$('#fcode'),client:$('#fclient'),court:$('#fcourt'),cat:$('#fcat'),result:$('#fresult'),prio:$('#fprio'),owner:$('#fowner'),deadline:$('#fdeadline'),budget:$('#fbudget'),notes:$('#fnotes'),contactFirstName:$('#fcontactFirstName'),contactLastName:$('#fcontactLastName'),contactPhone:$('#fcontactPhone'),contactEmail:$('#fcontactEmail'),city:$('#fcity'),address:$('#faddress'),companyId:$('#fcompanyId'),hearingDate:$('#fhearingDate'),hearingTime:$('#fhearingTime'),reminderDate:$('#freminderDate'),meetingLocation:$('#fmeetingLocation'),nextAction:$('#fnextAction'),opposingParty:$('#fopposingParty'),opposingLawyer:$('#fopposingLawyer'),tags:$('#ftags')};
let currentView='cases',stage='მიმდინარე',court='ყველა',cat='ყველა',result='ყველა',term='',selected=null,cases=[];
const stageOf=v=>v==='შეწყვეტილი'?'შეწყვეტილი':['მოგებული','წაგებული','მორიგებით დასრულებული'].includes(v)?'დასრულებული':'მიმდინარე';
const pill=v=>v==='დასრულებული'?'bg-emerald-50 text-emerald-700 border-emerald-100':v==='შეწყვეტილი'?'bg-amber-50 text-amber-700 border-amber-100':'bg-blue-50 text-blue-700 border-blue-100';
const chips=(el,arr,current)=>el.innerHTML=arr.map(v=>`<button data-v="${v}" class="${v===current?'bg-slate-900 text-white':'bg-slate-50 text-slate-600 border border-slate-200'} px-3 py-2 rounded-full text-sm font-bold">${v}</button>`).join('');
const formMessage=(type,text)=>{const el=$('#fmsg');el.className=`rounded-2xl border px-4 py-3 text-sm font-medium ${type==='ok'?'border-emerald-200 bg-emerald-50 text-emerald-700':'border-rose-200 bg-rose-50 text-rose-700'}`;el.textContent=text;el.classList.remove('off')};
const detailMessage=(type,text)=>{const el=$('#dmsg');el.className=`mt-4 rounded-2xl border px-4 py-3 text-sm font-medium ${type==='ok'?'border-emerald-200 bg-emerald-50 text-emerald-700':'border-rose-200 bg-rose-50 text-rose-700'}`;el.textContent=text;el.classList.remove('off')};
function setView(v){currentView=v;Object.entries(views).forEach(([k,e])=>e.classList.toggle('off',k!==v));$('#eyebrow').textContent=v==='detail'?'Case Detail':'Cases';$('#title').textContent=v==='detail'?'საქმის დეტალები':'საქმეები';render()}
const openFormModal=()=>{formModal.classList.remove('off');document.body.classList.add('overflow-hidden')},closeFormModal=()=>{formModal.classList.add('off');document.body.classList.remove('overflow-hidden');$('#fmsg').classList.add('off')};
function buildMeta(){return{contact_first_name:fields.contactFirstName.value.trim(),contact_last_name:fields.contactLastName.value.trim(),contact_phone:fields.contactPhone.value.trim(),contact_email:fields.contactEmail.value.trim(),city:fields.city.value.trim(),address:fields.address.value.trim(),company_id:fields.companyId.value.trim(),hearing_date:fields.hearingDate.value,hearing_time:fields.hearingTime.value,reminder_date:fields.reminderDate.value,meeting_location:fields.meetingLocation.value.trim(),next_action:fields.nextAction.value.trim(),opposing_party:fields.opposingParty.value.trim(),opposing_lawyer:fields.opposingLawyer.value.trim(),tags:fields.tags.value.trim()}}
function resetForm(){Object.values(fields).forEach(f=>f.value='');fields.court.value=COURTS[1];fields.cat.value=CATS[1];fields.result.value=RES[1];fields.prio.value='მაღალი';$('#ftitle').textContent='ახალი საქმე';$('#fmsg').classList.add('off')}
function extractMeta(notes){if(!notes||!notes.includes('\n[[CASE_META]]\n'))return{cleanNotes:notes||'',meta:{}};const parts=notes.split('\n[[CASE_META]]\n');try{return{cleanNotes:parts[0].trim(),meta:JSON.parse(parts[1])||{}}}catch{return{cleanNotes:notes,meta:{}}}}
function fill(item){const m=item.meta||{};fields.id.value=item.id;fields.name.value=item.name;fields.code.value=item.code;fields.client.value=item.client;fields.court.value=item.court;fields.cat.value=item.cat;fields.result.value=item.result;fields.prio.value=item.prio;fields.owner.value=item.owner||'';fields.deadline.value=item.deadline||'';fields.budget.value=item.budget||'';fields.notes.value=item.notes||'';fields.contactFirstName.value=m.contact_first_name||'';fields.contactLastName.value=m.contact_last_name||'';fields.contactPhone.value=m.contact_phone||'';fields.contactEmail.value=m.contact_email||'';fields.city.value=m.city||'';fields.address.value=m.address||'';fields.companyId.value=m.company_id||'';fields.hearingDate.value=m.hearing_date||'';fields.hearingTime.value=m.hearing_time||'';fields.reminderDate.value=m.reminder_date||'';fields.meetingLocation.value=m.meeting_location||'';fields.nextAction.value=m.next_action||'';fields.opposingParty.value=m.opposing_party||'';fields.opposingLawyer.value=m.opposing_lawyer||'';fields.tags.value=m.tags||'';$('#ftitle').textContent='საქმის რედაქტირება';openFormModal()}
const searchableText=i=>[i.name,i.code,i.client,i.court,i.cat,i.result,i.prio,i.owner,i.deadline,i.budget,i.notes,i.meta?.contact_first_name,i.meta?.contact_last_name,i.meta?.contact_phone,i.meta?.contact_email,i.meta?.city,i.meta?.address,i.meta?.next_action,i.meta?.opposing_party,i.meta?.tags].join(' ').toLowerCase();
function filteredCases(){return cases.filter(i=>{if(stage!=='ყველა'&&stageOf(i.result)!==stage)return false;if(court!=='ყველა'&&i.court!==court)return false;if(cat!=='ყველა'&&i.cat!==cat)return false;if(result!=='ყველა'&&i.result!==result)return false;const q=term.trim().toLowerCase();return !q||searchableText(i).includes(q)})}
function renderList(){ $('#c1').textContent=`${cases.filter(i=>stageOf(i.result)==='მიმდინარე').length} საქმე`; $('#c2').textContent=`${cases.filter(i=>stageOf(i.result)==='დასრულებული').length} საქმე`; $('#c3').textContent=`${cases.filter(i=>stageOf(i.result)==='შეწყვეტილი').length} საქმე`; $('#c4').textContent=`${cases.length} საქმე`; $$('.stage').forEach(b=>b.className=b.dataset.stage===stage?'stage rounded-2xl border bg-blue-50 px-4 py-4 text-left':'stage rounded-2xl border bg-slate-50 px-4 py-4 text-left'); chips($('#courts'),COURTS,court); chips($('#cats'),CATS,cat); chips($('#results'),RES,result); const items=filteredCases(); $('#meta').textContent=`${items.length} შედეგი`; $('#empty').classList.toggle('off',items.length!==0); $('#list').innerHTML=items.map(i=>`<article data-open="${i.id}" class="rounded-3xl bg-white border p-5 cursor-pointer"><div class="flex items-start justify-between gap-4 mb-4"><div><div class="flex flex-wrap items-center gap-2 mb-2"><h3 class="text-lg font-extrabold">${i.name}</h3><span class="inline-flex items-center rounded-full border px-2.5 py-1 text-[11px] font-bold ${pill(stageOf(i.result))}">${stageOf(i.result)}</span></div><div class="text-sm text-slate-500">${i.code} • ${i.client}</div></div><div class="text-right"><div class="text-xs text-slate-400">შედეგი</div><div class="font-bold">${i.result}</div></div></div><div class="grid grid-cols-2 gap-3 mb-4 text-sm"><div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-xs text-slate-400 mb-1">სასამართლო</div><div class="font-bold">${i.court}</div></div><div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-xs text-slate-400 mb-1">ტიპი</div><div class="font-bold">${i.cat}</div></div><div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-xs text-slate-400 mb-1">საკონტაქტო პირი</div><div class="font-bold">${[i.meta?.contact_first_name,i.meta?.contact_last_name].filter(Boolean).join(' ')||'-'}</div></div><div class="rounded-2xl bg-slate-50 px-4 py-3"><div class="text-xs text-slate-400 mb-1">ვადა</div><div class="font-bold">${i.deadline||i.meta?.hearing_date||'-'}</div></div></div><div class="rounded-2xl bg-slate-50 px-4 py-3 mb-4"><div class="text-xs text-slate-400 mb-1">შემდეგი ქმედება</div><div class="text-sm leading-6">${i.meta?.next_action||i.notes||'არ არის დამატებული.'}</div></div><div class="flex items-center justify-between gap-3"><div class="text-sm text-slate-500">ბიუჯეტი: <span class="font-bold text-slate-700">${i.budget||'-'}</span></div><div class="flex gap-2"><button data-act="edit" data-id="${i.id}" class="px-3 py-2 rounded-xl border text-sm font-bold text-slate-700">რედაქტირება</button><button data-act="del" data-id="${i.id}" class="px-3 py-2 rounded-xl border border-rose-200 text-sm font-bold text-rose-600">წაშლა</button></div></div></article>`).join('')}
function renderDetail(){const i=cases.find(x=>x.id===selected);if(!i)return;$('#dcode').textContent=i.code;$('#dname').textContent=i.name;$('#dclient').textContent=i.client;$('#dcourt').textContent=i.court;$('#dcat').textContent=i.cat;$('#dcontact').textContent=[[i.meta?.contact_first_name,i.meta?.contact_last_name].filter(Boolean).join(' '),i.meta?.contact_phone,i.meta?.contact_email].filter(Boolean).join(' • ')||'-';$('#ddead').textContent=[i.deadline,i.meta?.hearing_date,i.meta?.hearing_time].filter(Boolean).join(' • ')||'-';$('#dnotes').textContent=[i.notes,i.meta?.next_action?`შემდეგი ქმედება: ${i.meta.next_action}`:'',i.meta?.meeting_location?`ლოკაცია: ${i.meta.meeting_location}`:'',i.meta?.address?`მისამართი: ${i.meta.address}`:'',i.meta?.opposing_party?`მოწინააღმდეგე მხარე: ${i.meta.opposing_party}`:'',i.meta?.opposing_lawyer?`მოწინააღმდეგე იურისტი: ${i.meta.opposing_lawyer}`:'',i.meta?.tags?`თეგები: ${i.meta.tags}`:''].filter(Boolean).join('\n\n')||'შენიშვნები არ არის დამატებული.';$('#dfiles').innerHTML=(i.files||[]).length?(i.files||[]).map(f=>`<div class="rounded-2xl bg-white border px-4 py-3"><div class="flex items-start justify-between gap-3"><div><div class="font-bold">${f.file_name}</div><div class="text-xs text-slate-500 mt-1">${f.file_type||'ფაილი'} • ${f.file_size_kb||0} KB</div></div>${f.signed_url?`<a href="${f.signed_url}" target="_blank" rel="noopener noreferrer" class="px-3 py-2 rounded-xl border text-sm font-bold text-blue-700">გახსნა</a>`:''}</div></div>`).join(''):'<div class="rounded-2xl bg-white border border-dashed border-slate-300 px-4 py-6 text-center text-slate-500">ფაილები ჯერ არ არის ატვირთული</div>'}
const render=()=>{renderList();if(currentView==='detail')renderDetail()};
async function getCurrentUser(){const {data,error}=await window.supabaseClient.auth.getUser();if(error)throw error;if(!data.user){window.location.href='login.html';throw new Error('ავტორიზაცია საჭიროა.')}return data.user}
async function withSignedUrls(files){return Promise.all((files||[]).map(async f=>{if(!f.file_path)return f;const {data}=await window.supabaseClient.storage.from('case-files').createSignedUrl(f.file_path,3600);return {...f,signed_url:data?.signedUrl||null}}))}
async function mapCase(row){const parsed=extractMeta(row.notes);return{id:row.id,user_id:row.user_id,name:row.title,code:row.code,client:row.client_name,court:row.court,cat:row.category,result:row.result,prio:row.priority,owner:row.owner_name,deadline:row.deadline,budget:row.budget,notes:parsed.cleanNotes,meta:parsed.meta,files:await withSignedUrls(row.case_files||[])}}
async function loadCasesFromDb(){const user=await getCurrentUser();const {data,error}=await window.supabaseClient.from('cases').select('id,user_id,title,code,client_name,court,category,result,priority,owner_name,deadline,budget,notes,created_at,case_files(id,file_name,file_type,file_size_kb,file_path,created_at)').eq('user_id',user.id).order('created_at',{ascending:false});if(error)throw error;cases=await Promise.all((data||[]).map(mapCase));render()}
async function saveCaseToDb(payload){const user=await getCurrentUser();const row={user_id:user.id,title:payload.name,code:payload.code,client_name:payload.client,court:payload.court,category:payload.cat,result:payload.result,priority:payload.prio,owner_name:payload.owner||null,deadline:payload.deadline||null,budget:payload.budget||null,notes:`${payload.notes||''}\n[[CASE_META]]\n${JSON.stringify(payload.meta||{})}`};if(payload.id){const {error}=await window.supabaseClient.from('cases').update(row).eq('id',payload.id).eq('user_id',user.id);if(error)throw error;return payload.id}const {data,error}=await window.supabaseClient.from('cases').insert(row).select('id').single();if(error)throw error;return data.id}
async function deleteCaseFromDb(id){const user=await getCurrentUser();const {error}=await window.supabaseClient.from('cases').delete().eq('id',id).eq('user_id',user.id);if(error)throw error}
async function uploadFilesToDb(caseId,files){const user=await getCurrentUser();const rows=[];for(const file of Array.from(files)){const safeName=`${Date.now()}-${Math.random().toString(36).slice(2)}-${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;const filePath=`${user.id}/${caseId}/${safeName}`;const {error:uploadError}=await window.supabaseClient.storage.from('case-files').upload(filePath,file,{upsert:false});if(uploadError)throw uploadError;rows.push({case_id:caseId,user_id:user.id,file_name:file.name,file_type:file.type||'ფაილი',file_size_kb:Math.max(1,Math.round(file.size/1024)),file_path:filePath})}const {error}=await window.supabaseClient.from('case_files').insert(rows);if(error)throw error}
$('#fcourt').innerHTML=COURTS.slice(1).map(v=>`<option>${v}</option>`).join('');$('#fcat').innerHTML=CATS.slice(1).map(v=>`<option>${v}</option>`).join('');$('#fresult').innerHTML=RES.slice(1).map(v=>`<option>${v}</option>`).join('');resetForm();$('#goDashboard').onclick=()=>window.location.href='dashboard.html';$('#goCalendar').onclick=()=>window.location.href='calendar.html';$('#newCase').onclick=()=>{resetForm();openFormModal();fields.name.focus()};$('#primary').onclick=()=>{resetForm();openFormModal();fields.name.focus()};$('#closeForm').onclick=closeFormModal;$('#resetForm').onclick=()=>{if(window.confirm('დარწმუნებული ხარ, რომ ფორმის გასუფთავება გინდა?'))resetForm()};$('#back').onclick=()=>setView('cases');formModal.onclick=e=>{if(e.target===formModal)closeFormModal()};$$('.stage').forEach(b=>b.onclick=()=>{stage=b.dataset.stage;renderList()});$('#courts').onclick=e=>{const b=e.target.closest('button[data-v]');if(!b)return;court=b.dataset.v;renderList()};$('#cats').onclick=e=>{const b=e.target.closest('button[data-v]');if(!b)return;cat=b.dataset.v;renderList()};$('#results').onclick=e=>{const b=e.target.closest('button[data-v]');if(!b)return;result=b.dataset.v;renderList()};$('#search').oninput=e=>{term=e.target.value;renderList()};$('#gsearch').oninput=e=>{term=e.target.value;$('#search').value=e.target.value;render()};$('#list').onclick=async e=>{const action=e.target.closest('button[data-act]');if(action){const item=cases.find(x=>x.id===action.dataset.id);if(!item)return;if(action.dataset.act==='edit'){fill(item)}else{try{await deleteCaseFromDb(item.id);await loadCasesFromDb()}catch(error){formMessage('err',error.message||'წაშლა ვერ შესრულდა.')}}return}const card=e.target.closest('[data-open]');if(!card)return;selected=card.dataset.open;setView('detail')};$('#form').onsubmit=async e=>{e.preventDefault();const payload={id:fields.id.value||null,name:fields.name.value.trim(),code:fields.code.value.trim(),client:fields.client.value.trim(),court:fields.court.value,cat:fields.cat.value,result:fields.result.value,prio:fields.prio.value,owner:fields.owner.value.trim(),deadline:fields.deadline.value,budget:fields.budget.value.trim(),notes:fields.notes.value.trim(),meta:buildMeta()};if(!payload.name||!payload.code||!payload.client){formMessage('err','შეავსე მინიმუმ საქმის დასახელება, კოდი და კლიენტი.');return}try{selected=await saveCaseToDb(payload);stage=stageOf(payload.result);formMessage('ok',payload.id?'საქმე განახლდა.':'ახალი საქმე დაემატა.');await loadCasesFromDb();setTimeout(()=>{closeFormModal();resetForm()},700)}catch(error){formMessage('err',error.message||'შენახვა ვერ შესრულდა.')}};$('#files').onchange=async e=>{const item=cases.find(x=>x.id===selected);if(!item||!e.target.files.length)return;try{await uploadFilesToDb(item.id,e.target.files);detailMessage('ok','ფაილები დაემატა ამ საქმეს.');await loadCasesFromDb();renderDetail();e.target.value=''}catch(error){detailMessage('err',error.message||'ფაილების დამატება ვერ შესრულდა.')}};(async function init(){try{await loadCasesFromDb();const params=new URLSearchParams(window.location.search);const requestedId=params.get('id');if(requestedId&&cases.some(x=>x.id===requestedId)){selected=requestedId;setView('detail')}else{setView('cases')}if(params.get('new')==='1'){resetForm();openFormModal();fields.name.focus()}}catch(error){console.error(error)}})();
</script>
