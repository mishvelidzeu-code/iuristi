<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexFlow | რეგისტრაცია</title>
  <meta name="description" content="LexFlow-ის რეგისტრაციის გვერდი იურიდიული პროფესიის წარმომადგენლებისთვის.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&family=Noto+Serif+Georgian:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <div class="page-shell auth-shell">
    <a class="back-link" href="index.html">მთავარ გვერდზე დაბრუნება</a>

    <section class="auth-layout">
      <div class="auth-copy">
        <div class="eyebrow">Create Account</div>
        <h1>ანგარიშის რეგისტრაცია</h1>
        <p>
          შექმენი პერსონალური კაბინეტი, დაამატე ბიურო ან ორგანიზაცია და მოემზადე სისტემის სრულად გამოსაყენებლად.
        </p>
        <div class="auth-points">
          <span>ადვოკატი</span>
          <span>პროკურორი</span>
          <span>მოსამართლე</span>
        </div>
      </div>

      <div class="auth-card">
        <h2>რეგისტრაცია</h2>
        <form class="auth-form" data-auth-form="register">
          <div class="auth-form-grid">
            <label>
              სახელი
              <input name="first_name" type="text" placeholder="მაგ: ნინო" required>
            </label>
            <label>
              გვარი
              <input name="last_name" type="text" placeholder="მაგ: გელაშვილი" required>
            </label>
          </div>
          <label>
            ელფოსტა
            <input name="email" type="email" placeholder="name@example.com" required>
          </label>
          <label>
            ტელეფონის ნომერი
            <input name="phone" type="tel" placeholder="მაგ: 599123456" required>
          </label>
          <label>
            ორგანიზაცია / ბიურო
            <input name="bureau_name" type="text" placeholder="ბიუროს ან უწყების დასახელება">
          </label>
          <div class="auth-form-grid">
            <label>
              პაროლი
              <input name="password" type="password" placeholder="შექმენი პაროლი" required minlength="6">
            </label>
            <label>
              გაიმეორე პაროლი
              <input name="confirm_password" type="password" placeholder="გაიმეორე პაროლი" required minlength="6">
            </label>
          </div>
          <button type="submit">ანგარიშის შექმნა</button>
        </form>
        <p class="auth-feedback" data-auth-feedback></p>
        <p class="auth-switch">უკვე გაქვს ანგარიში? <a href="login.html">შესვლა</a></p>
      </div>
    </section>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
